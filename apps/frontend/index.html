<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Default title (overridden per-page by react-helmet-async) -->
  <title>Muse — AI Art Marketplace</title>

  <!-- SEO baseline -->
  <meta name="description" content="Discover, collect, and mint AI-generated artwork on Muse — the decentralized art marketplace powered by Stellar." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Muse" />
  <meta name="theme-color" content="#7C3AED" />

  <!-- Open Graph baseline -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Muse — AI Art Marketplace" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:title" content="Muse — AI Art Marketplace" />
  <meta property="og:description" content="Discover, collect, and mint AI-generated artwork on Muse — the decentralized art marketplace powered by Stellar." />

  <!-- Twitter Card baseline -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@museartmarket" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
